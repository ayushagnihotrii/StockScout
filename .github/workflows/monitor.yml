name: Stock Watchlist Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: stock-watchlist-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run monitor
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          CHECK_INTERVAL: "300"
          HEADLESS: "true"
        run: python monitor.py

      - name: Commit and push watchlist/bot state
        if: always()
        run: |
          git config user.name "stock-watchlist-bot"
          git config user.email "actions@users.noreply.github.com"
          git add watchlist.json bot_state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi
          git commit -m "Update watchlist/bot state [skip ci]"
          for i in 1 2; do
            if git push; then
              exit 0
            fi
            echo "Push rejected, rebasing onto latest and retrying..."
            git pull --rebase
          done
          git push

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/
          retention-days: 5
